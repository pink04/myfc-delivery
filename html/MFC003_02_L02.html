<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>상담 요청 확인</title>

    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/content.css" />
  </head>
  <body>
    <div class="c-modal sm is-open">
      <button type="button" class="c-modal-backdrop" data-popup-close aria-label="닫기"></button>
      <div class="c-modal-panel">
        <button type="button" class="c-modal-close" data-popup-close aria-label="닫기"></button>
        <div class="c-modal-body">
          <p class="modal-text">
            MyFC 회원가입 시 입력하셨던<br />
            <strong> “이름, 전화번호, 지역, 생년월일, 성별”</strong> 이<br />
            FC에게 전달됩니다. 동의하십니까?
          </p>
        </div>
        <div class="c-modal-foot">
          <div class="c-modal-btns">
            <button type="button" class="btn btn-primary">동의하고 상담 요청 하기</button>
            <button type="button" class="btn btn-sub" data-popup-close>닫기</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/popup.js"></script>
    <script src="../assets/js/common.js"></script>
  </body>
</html>
