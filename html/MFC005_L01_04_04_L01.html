<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>후기 선택 (팝업)</title>

    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/content.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  </head>
  <body class="popup-open">
    <div id="popup-ad-review" class="c-modal lg is-open" role="dialog" aria-modal="true">
      <button type="button" class="c-modal-backdrop" data-popup-close></button>
      <div class="c-modal-panel">
        <div class="c-modal-head">
          <h2 class="c-modal-title">후기 선택</h2>
          <button type="button" class="c-modal-close" data-popup-close aria-label="닫기"></button>
        </div>
        <div class="c-modal-body">
          <div class="detail-page">
            <section class="detail-reviews">
              <header>
                <div class="section-head">
                  <div class="section-head-right">
                    <div class="control-box">
                      <button type="button" class="control-btn swiper-nav-prev" aria-label="이전 후기"></button>
                      <button type="button" class="control-btn swiper-nav-next" aria-label="다음 후기"></button>
                    </div>
                  </div>
                </div>
              </header>

              <div class="detail-reviews-panel">
                <div class="swiper detail-reviews-swiper">
                  <div class="swiper-wrapper">
                    <div class="swiper-slide">
                      <div>
                        <button type="button" class="review-card c-modal-option" data-value="rev_001">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.9</p>
                            <p class="review-author">정**</p>
                            <time class="review-date">2025.10.01</time>
                          </div>
                          <h4>여러 보험 정보를 한눈에 비교할 수 있어 확실히 전문성이 느껴졌습니다</h4>
                          <p class="review-card-body">
                            그동안은 한 보험사 설계사만 만나 상품을 추천받는 게 당연하다고 생각했습니다. 하지만 MyFC에서는 여러 FC의 조건과
                            이력을 한눈에 비교할 수 있어 훨씬 도움이 됐습니다. 원하던 보장은 충분하면서도 불필요한 비용은 줄이는 것에 딱
                            맞는 결과를 얻을 수 있었고, 플랜 조율 덕분에 불필요한 지출을 줄일 수 있었습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_002">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 5.0</p>
                            <p class="review-author">박**</p>
                            <time class="review-date">2025.10.01</time>
                          </div>
                          <h4>꼼꼼한 상담과 빠른 대응으로 믿음이 갔습니다</h4>
                          <p class="review-card-body">
                            보험은 늘 어렵다고만 생각했는데, FC님이 제 상황을 자세히 들어주고 맞는 상품만 비교해 주셔서 안심할 수
                            있었습니다. 특히 상담 후에도 카톡으로 궁금한 점을 빠르게 답변해 주셔서 신뢰가 갔습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_003">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.9</p>
                            <p class="review-author">이**</p>
                            <time class="review-date">2025.10.01</time>
                          </div>
                          <h4>아이 보험을 제대로 준비할 수 있었어요</h4>
                          <p class="review-card-body">
                            아이 보험은 항상 고민이었는데, FC님이 자녀 전용 상품들을 비교해 주셔서 불필요한 부분은 빼고 꼭 필요한 보장만
                            선택할 수 있었습니다. 덕분에 보험료도 줄이고 마음도 놓였습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_004">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.9</p>
                            <p class="review-author">정**</p>
                            <time class="review-date">2025.10.01</time>
                          </div>
                          <h4>전문성이 돋보이는 상담, 부담 없는 설명</h4>
                          <p class="review-card-body">
                            과거에는 권유 위주의 상담만 받아왔는데, 이번엔 제 소득·생활 패턴을 고려해 객관적으로 설명해 주셔서 정말 신뢰가
                            갔습니다. 단순히 판매가 아닌 전문가의 컨설팅 같았어요.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_005">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 5.0</p>
                            <p class="review-author">김**</p>
                            <time class="review-date">2025.10.01</time>
                          </div>
                          <h4>복잡한 보험 정리가 한 번에 끝났습니다</h4>
                          <p class="review-card-body">
                            그동안 여러 군데에서 가입한 보험이 생애에서 정리가 안 됐는데, FC님이 전부 검토하고 중복된 부분을 꼼꼼히 정리해
                            주셨습니다. 덕분에 비용도 줄고, 필요한 보장만 남길 수 있었습니다.
                          </p>
                        </button>
                      </div>
                    </div>
                    <div class="swiper-slide">
                      <div>
                        <button type="button" class="review-card c-modal-option" data-value="rev_006">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.8</p>
                            <p class="review-author">최**</p>
                            <time class="review-date">2025.09.28</time>
                          </div>
                          <h4>부모님 실비 보장을 같이 잡아 주셔서 든든했습니다</h4>
                          <p class="review-card-body">
                            연세 있으신 부모님 상품은 조건이 까다로워 막막했는데, FC님이 병력과 예산에 맞는 범위에서 현실적으로 정리해
                            주셨습니다. 설명도 차분해서 부모님께도 이해시키기 쉬웠습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_007">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 5.0</p>
                            <p class="review-author">한**</p>
                            <time class="review-date">2025.09.25</time>
                          </div>
                          <h4>이직 준비하며 실업급여·실손 정리를 한 번에</h4>
                          <p class="review-card-body">
                            소득 공백이 걱정됐는데 공단 연계와 보험 중복까지 같이 봐 주셔서 불안이 많이 줄었습니다. 다음 직장 정해지면 다시
                            한 번 봐도 된다고 해서 부담 없이 상담받았습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_008">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.9</p>
                            <p class="review-author">윤**</p>
                            <time class="review-date">2025.09.20</time>
                          </div>
                          <h4>비교표로 보니 제가 놓치던 특약이 보였어요</h4>
                          <p class="review-card-body">
                            약관만 혼자 읽기엔 한계가 있는데, 표로 정리해 주신 덕분에 보장 범위 차이가 한눈에 들어왔습니다. 필요 없는 특약은
                            과감히 빼고 핵심만 남겼습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_009">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 4.7</p>
                            <p class="review-author">조**</p>
                            <time class="review-date">2025.09.15</time>
                          </div>
                          <h4>야근이 잦아도 상담 일정 맞춰 주셔서 감사했습니다</h4>
                          <p class="review-card-body">
                            평일 저녁이나 짧은 통화로도 진행이 가능해서 직장인에게 부담이 적었습니다. 다음 단계 진행 시에도 같은 방식으로
                            이어가고 싶습니다.
                          </p>
                        </button>
                        <button type="button" class="review-card c-modal-option" data-value="rev_010">
                          <span class="c-modal-option-ico" aria-hidden="true"></span>
                          <div class="review-card-meta">
                            <p class="c-rate"><span class="c-rate-star">★</span> 5.0</p>
                            <p class="review-author">송**</p>
                            <time class="review-date">2025.09.10</time>
                          </div>
                          <h4>주택담보대출과 보험료 밸런스를 같이 봐 주셨어요</h4>
                          <p class="review-card-body">
                            월 상환과 보험료가 겹쳐 총 현금 흐름이 빠듯했는데, 우선순위를 정해 단계적으로 조정할 수 있었습니다. 숫자 근거가
                            있어 설득력이 있었습니다.
                          </p>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
        <div class="c-modal-foot">
          <button type="button" class="c-modal-confirm" data-popup-confirm>확인</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/popup.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
      (function () {
        'use strict';
        if (typeof MyFC === 'undefined' || typeof Swiper === 'undefined') return;

        var modal = document.getElementById('popup-ad-review');
        var scope = modal && modal.querySelector('.detail-reviews');
        var el = scope && scope.querySelector('.detail-reviews-swiper');
        var swiper = null;

        if (el && scope) {
          swiper = MyFC.initSwiper(el, scope, {
            speed: 450,
            slidesPerView: 1,
            spaceBetween: 0,
            allowTouchMove: false,
            watchOverflow: true,
            loop: true,
          });
        }

        if (modal && swiper) {
          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(function () {
              if (swiper && typeof swiper.update === 'function') swiper.update();
            });
          });
        }

        var firstOpt = modal && modal.querySelector('.c-modal-option');
        if (firstOpt) firstOpt.classList.add('is-selected');
      })();
    </script>
  </body>
</html>
