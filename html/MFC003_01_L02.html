<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>활동 스토리 상세</title>

    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/content.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  </head>
  <body>
    <div class="c-modal md is-open">
      <button type="button" class="c-modal-backdrop" data-popup-close aria-label="닫기"></button>
      <div class="c-modal-panel">
        <div class="c-modal-head">
          <h2 class="c-modal-title">활동 스토리</h2>
          <button type="button" class="c-modal-close" data-popup-close aria-label="닫기"></button>
        </div>

        <div class="c-modal-body">
          <div class="story-detail-wrap">
            <button type="button" class="control-btn swiper-nav-prev" aria-label="이전 이미지"></button>

            <div class="swiper">
              <div class="swiper-wrapper">
                <div class="swiper-slide">
                  <article class="story-detail-card">
                    <div class="body">
                      <img src="../assets/images/temp/@story01.jpg" alt="활동 이미지 1 상세" />
                    </div>
                  </article>
                </div>
                <div class="swiper-slide">
                  <article class="story-detail-card">
                    <div class="body">
                      <img src="../assets/images/temp/@story03-portrait.jpg" alt="활동 이미지 2 상세 (세로비율)" />
                    </div>
                  </article>
                </div>
                <div class="swiper-slide">
                  <article class="story-detail-card">
                    <div class="body">
                      <img src="../assets/images/temp/@story01.jpg" alt="활동 이미지 3 상세" />
                    </div>
                  </article>
                </div>
              </div>
            </div>

            <button type="button" class="control-btn swiper-nav-next" aria-label="다음 이미지"></button>
          </div>
        </div>

        <div class="c-modal-foot">
          <button type="button" class="btn btn-line" data-popup-close>닫기</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/popup.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
      (function () {
        'use strict';
        if (typeof MyFC === 'undefined' || typeof Swiper === 'undefined') return;

        var scope = document.querySelector('.story-detail-wrap');
        var el = scope && scope.querySelector('.swiper');
        if (!scope || !el) return;

        var swiper = MyFC.initSwiper(el, scope, {
          speed: 380,
          slidesPerView: 1,
          spaceBetween: 0,
          centeredSlides: false,
          loop: false,
          watchOverflow: false,
          observer: true,
          observeParents: true,
          grabCursor: true,
          autoHeight: true,
        });

        if (swiper) {
          requestAnimationFrame(function () {
            swiper.update();
          });
        }

        var query = new URLSearchParams(window.location.search);
        var index = Number(query.get('index') || 0);
        if (swiper && !Number.isNaN(index) && index >= 0) {
          setTimeout(function () {
            swiper.slideTo(index, 0);
          }, 0);
        }
      })();
    </script>
  </body>
</html>
