    <div class="layout-wrapper form-page">
      <header class="site-header guest">
        <div class="header-mo">
          <a href="MFC001.html" aria-label="목록으로">
            <img src="../assets/images/ic-chevron-left.svg" alt="" />
          </a>
        </div>
        <div class="header-inner">
          <div class="logo">
            <a href="MFC001.html">
              <img src="../assets/images/logo.png" alt="보험사 연계 서비스" class="logo-img" />
            </a></div>
          <nav class="gnb">
            <ul>
              <li>
                <a href="MFC002.html" class="gnb-search">
                  <img src="../assets/images/ic-search.svg" alt="" class="gnb-ico" />
                </a>
              </li>
              <li class="guest">
                <a href="#" class="gnb-btn-line">회원가입</a>
              </li>
              <li class="guest">
                <a href="#" class="gnb-btn-line">로그인</a>
              </li>
              <li class="member">
                <button type="button" class="gnb-avatar" aria-label="마이페이지 메뉴 열기">
                  <img src="../assets/images/temp/@profile-m.png" alt="" class="gnb-avatar-img" />
                </button>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <div class="page-inner-narrow">
          <h1 class="page-main-title">로그인</h1>

          <form class="form-box" method="post">
            <div class="form-field">
              <label class="form-label" for="login-email">이메일</label>
              <input class="form-input" id="login-email" name="email" type="email" autocomplete="email" placeholder="이메일을 입력해주세요." />
            </div>

            <div class="form-field">
              <label class="form-label" for="login-password">비밀번호</label>
              <input
                class="form-input"
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="비밀번호를 입력해주세요."
              />
            </div>

            <div class="login-remember">
              <label class="c-check">
                <input type="checkbox" name="remember" />
                <span>로그인 유지</span>
              </label>
            </div>

            <!-- 로그인 버튼: 이메일 비밀번호 입력 후 활성화 > disabled 제거 -->
            <div class="form-actions">
              <button type="submit" disabled>로그인</button>
            </div>

            <div class="login-or" role="presentation">
              <span>또는</span>
            </div>

            <a href="MFC006_01_01.html" class="login-secondary">계정찾기</a>

            <p class="login-reset">
              <a href="MFC006_01_02.html">비밀번호 재설정</a>
            </p>
          </form>
        </div>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-top">
            <p class="footer-logo">
              <a href="MFC001.html" class="footer-logo-link">MyFC</a>
            </p>
            <ul class="footer-links">
              <li><a href="#">이용약관</a></li>
              <li><a href="#">개인정보 처리방침</a></li>
            </ul>
          </div>
          <div class="footer-info">
            <p class="footer-ceo">
              <span>(주)더리치랩</span>
              <span>대표이사 박영진</span>
            </p>
            <p class="footer-info-split">
              <span>서울특별시 강남구 테헤란로 507, 8층 131호</span>
              <span>E-mail : <a href="mailto:myfc.helpdesk@gmail.com">myfc.helpdesk@gmail.com</a></span>
            </p>
            <p class="footer-info-split">
              <span>사업자등록번호 : 762-88-02797</span>
              <span>통신판매번호 : 제 2025-서울강남-06308호</span>
            </p>
          </div>
          <p class="copyright">© 2026 Therichlabcompany, Inc.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
