          <nav class="gnb">

      <main>
        <div class="page-inner-narrow">
          <h1 class="page-main-title">내 증권 관리</h1>
          <p class="page-main-lead">가지고 계신 보장 자료(증권 등)가 있다면 첨부해 주세요.</p>

          <section>
            <h2 class="visually-hidden">첨부 파일 목록</h2>
            <ul class="securities-files" data-securities-list>
              <li>
                <div class="securities-row">
                  <button type="button" class="securities-file is-selected">손해x 고객님 증권 파일 1.pdf</button>
                  <button type="button" class="securities-remove" aria-label="손해x 고객님 증권 파일 1.pdf 삭제"></button>
                </div>
              </li>
              <li>
                <div class="securities-row">
                  <button type="button" class="securities-file">손해x 고객님 증권 파일 2.pdf</button>
                  <button type="button" class="securities-remove" aria-label="손해x 고객님 증권 파일 2.pdf 삭제"></button>
                </div>
              </li>
              <li>
                <div class="securities-row">
                  <button type="button" class="securities-file">손해x 고객님 증권 파일 3.pdf</button>
                  <button type="button" class="securities-remove" aria-label="손해x 고객님 증권 파일 3.pdf 삭제"></button>
                </div>
              </li>
            </ul>
            <p class="securities-add-wrap">
              <button type="button" class="securities-add" data-securities-add aria-label="파일 항목 추가"></button>
            </p>
            <input type="file" data-securities-file-input accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.ppt,.pptx" multiple hidden />
          </section>

          <div class="form-actions">
            <button type="button" class="securities-submit">확인</button>
          </div>
        </div>
      </main>

      <footer class="site-footer">

              <span>(주)더리치랩</span>

    </div>

    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/popup.js"></script>
    <script src="../assets/js/common.js"></script>
    <script>
      (function () {
        'use strict';

        var list = document.querySelector('[data-securities-list]');
        var addBtn = document.querySelector('[data-securities-add]');
        var input = document.querySelector('[data-securities-file-input]');
        if (!list || !addBtn || !input) return;

        list.addEventListener('click', function (e) {
          var remove = e.target.closest('.securities-remove');
          if (remove) return remove.closest('li').remove();

          var btn = e.target.closest('.securities-file');
          if (!btn) return;

          var selected = list.querySelector('.securities-file.is-selected');
          if (selected) selected.classList.remove('is-selected');
          btn.classList.add('is-selected');
        });

        addBtn.addEventListener('click', function () {
          input.click();
        });

        input.addEventListener('change', function () {
          Array.prototype.forEach.call(input.files || [], function (file) {
            var li = document.createElement('li');
            li.innerHTML =
              '<div class="securities-row">' +
              '<button type="button" class="securities-file"></button>' +
              '<button type="button" class="securities-remove"></button>' +
              '</div>';
            li.querySelector('.securities-file').textContent = file.name;
            li.querySelector('.securities-remove').setAttribute('aria-label', file.name + ' 삭제');
            list.appendChild(li);
          });
          input.value = '';
        });
      })();
    </script>
  </body>
</html>
